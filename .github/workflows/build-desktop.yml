name: Build desktop packages

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "electron/**"
      - "css/**"
      - "js/**"
      - "index.html"
      - "package.json"
      - "forge.config.cjs"
      - "scripts/**"
      - ".github/workflows/build-desktop.yml"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            label: Windows x64
            artifact: dead-letter-office-windows-x64
          - os: ubuntu-latest
            platform: linux
            label: Linux x64
            artifact: dead-letter-office-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: npm install

      - name: Validate desktop configuration
        run: npm run test:desktop

      - name: Build packages
        run: npm run make -- --platform=${{ matrix.platform }} --arch=x64

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/**
          if-no-files-found: error
          retention-days: 14
